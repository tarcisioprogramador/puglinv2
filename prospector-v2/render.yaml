services:
  - type: web
    name: prospector-v2
    env: node
    region: ohio
    plan: free
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://prospector-v2.onrender.com
      - key: DB_PATH
        value: /var/data/prospector.db
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
